name: Setup Flutter
description: Pin Flutter from .github/flutter-version without GitHub Actions cache.

runs:
  using: composite
  steps:
    - name: Read Flutter version
      id: flutter_version
      shell: bash
      run: echo "version=$(tr -d ' \n\r' < .github/flutter-version)" >> "$GITHUB_OUTPUT"

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: ${{ steps.flutter_version.outputs.version }}
        cache: false
