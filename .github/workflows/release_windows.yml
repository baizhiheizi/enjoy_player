name: Release Windows

on:
  workflow_dispatch:
    inputs:
      build_installer:
        description: Build Inno Setup installer (EnjoyPlayerSetup-vX.Y.Z.exe)
        type: boolean
        default: true
      publish:
        description: Upload artifacts + update feeds on dl.enjoy.bot
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Windows release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-flutter

      - name: Build Windows release
        shell: bash
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build_installer }}" != "true" ]]; then
            args+=(--no-installer)
          fi
          bash .github/scripts/release_windows.sh "${args[@]}"

      - name: Publish direct-download feeds
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        shell: bash
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          SPARKLE_DSA_PRIV_PEM_BASE64: ${{ secrets.SPARKLE_DSA_PRIV_PEM_BASE64 }}
          RELEASE_REQUIRE_S3: "1"
        run: bash .github/scripts/release_windows.sh --publish-only --publish

      - name: Upload runner artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ github.ref_name }}
          path: build/windows/x64/runner/Release/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer artifact
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.build_installer)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.ref_name }}
          path: build/windows/installer/EnjoyPlayerSetup-v*.exe
          if-no-files-found: error
          retention-days: 30
