name: Codegen drift

on:
  pull_request:
    paths: &codegen_drift_paths
      - "lib/**"
      - "packages/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/flutter-version"
      - ".github/actions/setup-flutter/**"
      - ".github/scripts/check_codegen_drift.sh"
      - ".github/scripts/validate_ci_gates.sh"
      - ".github/workflows/codegen_drift.yml"
  push:
    branches: [main]
    paths: *codegen_drift_paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-flutter

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify no codegen drift
        run: bash .github/scripts/check_codegen_drift.sh
