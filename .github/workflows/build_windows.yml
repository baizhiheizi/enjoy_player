name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    # Self-hosted Windows runner not ready yet — keep on GitHub-hosted until registered.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter_version
        shell: bash
        run: echo "version=$(tr -d ' \n\r' < .github/flutter-version)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Ensure NuGet feed (WebView2 / flutter_inappwebview)
        shell: pwsh
        run: .github/scripts/ensure_nuget_feed.ps1

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build windows (debug)
        run: flutter build windows --debug

      - name: Flutter build windows (release)
        run: flutter build windows --release
